# Clawdmeter — full Docker (Compose) deployment for a Linux host.
#
# token-refresher : keeps the OAuth access token fresh (always runs)
# daemon          : BLE transport      — profile "ble"  (needs a host BT adapter)
# daemon-serial   : USB-serial transport — profile "usb" (no Bluetooth needed)
#
# Pick a transport with the profile:
#   docker compose --profile ble up -d     # over Bluetooth LE
#   docker compose --profile usb up -d     # over the device's USB cable
# (start.sh -t ble|usb wraps this.)
#
# One-time setup: copy your Claude credentials to ./secrets/.credentials.json.
# The refresher seeds an internal volume from it, then self-maintains the token.

# Shared build definition (one image, different commands per service).
x-image: &image
  build:
    context: .
    dockerfile: Dockerfile
  image: clawdmeter-daemon:latest

services:
  token-refresher:
    <<: *image
    container_name: clawdmeter-token-refresher
    restart: unless-stopped
    command: ["python", "token_refresher.py"]
    environment:
      CLAUDE_CREDENTIALS_PATH: /root/.claude/.credentials.json
      CLAUDE_CREDENTIALS_SEED: /seed/.credentials.json
      REFRESH_CHECK_INTERVAL: ${REFRESH_CHECK_INTERVAL:-600}
      REFRESH_MARGIN: ${REFRESH_MARGIN:-1800}
      REFRESH_ON_START: ${REFRESH_ON_START:-true}
      CLAUDE_OAUTH_TOKEN_URL: ${CLAUDE_OAUTH_TOKEN_URL:-https://console.anthropic.com/v1/oauth/token}
      CLAUDE_OAUTH_CLIENT_ID: ${CLAUDE_OAUTH_CLIENT_ID:-9d1c250a-e61b-44d9-88ed-5944d1962f5e}
    volumes:
      - clawd-token:/root/.claude
      - ${CLAUDE_CREDENTIALS_FILE:-./secrets/.credentials.json}:/seed/.credentials.json:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/root/.claude/.credentials.json"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s

  # ---- Transport A: Bluetooth LE (needs a host BT adapter + BlueZ) ----
  daemon:
    <<: *image
    container_name: clawdmeter-daemon
    restart: unless-stopped
    profiles: ["ble"]
    depends_on:
      token-refresher:
        condition: service_healthy
    network_mode: host
    # The container must reach the host's BlueZ over D-Bus; the host AppArmor
    # profile otherwise denies it (org.freedesktop.DBus.Error.AccessDenied).
    security_opt:
      - apparmor=unconfined
    volumes:
      - /var/run/dbus:/var/run/dbus:ro
      - clawd-token:/root/.claude:ro
      - clawd-config:/root/.config
    # If BlueZ access is still blocked on your distro, also try: privileged: true

  # ---- Transport B: USB serial (no Bluetooth) ----
  daemon-serial:
    <<: *image
    container_name: clawdmeter-daemon-serial
    restart: unless-stopped
    profiles: ["usb"]
    command: ["python", "claude_usage_daemon_serial.py"]
    depends_on:
      token-refresher:
        condition: service_healthy
    environment:
      SERIAL_PORT: ${SERIAL_PORT:-/dev/ttyUSB0}
      SERIAL_BAUD: ${SERIAL_BAUD:-115200}
      SCREEN_SLEEP_SECONDS: ${SCREEN_SLEEP_SECONDS:-}
    devices:
      - ${SERIAL_PORT:-/dev/ttyUSB0}:${SERIAL_PORT:-/dev/ttyUSB0}
    volumes:
      - clawd-token:/root/.claude:ro

volumes:
  clawd-token:
  clawd-config:
