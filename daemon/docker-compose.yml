# Clawdmeter — full Docker (Compose) deployment for a Linux host.
#
# Two services share one token volume:
#   token-refresher : keeps the OAuth access token fresh (the daemon never does)
#   daemon          : scans for the device over BLE and pushes usage to it
#
# REQUIRES A NATIVE LINUX HOST. Bluetooth LE needs the host's networking and the
# host's BlueZ stack reached over the system D-Bus socket. Docker Desktop
# (Windows/macOS) runs in a VM with no access to the Bluetooth radio.
#
# One-time setup: copy your Claude credentials to ./secrets/.credentials.json
# (from a machine where you've run `claude login`). The refresher seeds the
# volume from it on first run, then self-maintains the token — Claude Code does
# NOT need to be installed on this host.

# Shared build definition for both services (one image, two commands).
x-image: &image
  build:
    context: .
    dockerfile: Dockerfile
  image: clawdmeter-daemon:latest

services:
  token-refresher:
    <<: *image
    container_name: clawdmeter-token-refresher
    restart: unless-stopped
    command: ["python", "token_refresher.py"]
    environment:
      CLAUDE_CREDENTIALS_PATH: /root/.claude/.credentials.json
      CLAUDE_CREDENTIALS_SEED: /seed/.credentials.json
      REFRESH_CHECK_INTERVAL: ${REFRESH_CHECK_INTERVAL:-600}
      REFRESH_MARGIN: ${REFRESH_MARGIN:-1800}
      REFRESH_ON_START: ${REFRESH_ON_START:-true}
      # Override only if upstream OAuth details change:
      CLAUDE_OAUTH_TOKEN_URL: ${CLAUDE_OAUTH_TOKEN_URL:-https://console.anthropic.com/v1/oauth/token}
      CLAUDE_OAUTH_CLIENT_ID: ${CLAUDE_OAUTH_CLIENT_ID:-9d1c250a-e61b-44d9-88ed-5944d1962f5e}
    volumes:
      - clawd-token:/root/.claude
      - ${CLAUDE_CREDENTIALS_FILE:-./secrets/.credentials.json}:/seed/.credentials.json:ro
    healthcheck:
      # Daemon waits for this: token must be seeded before it starts polling.
      test: ["CMD", "test", "-f", "/root/.claude/.credentials.json"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s

  daemon:
    <<: *image
    container_name: clawdmeter-daemon
    restart: unless-stopped
    depends_on:
      token-refresher:
        condition: service_healthy
    # BLE: share the host network namespace and talk to host BlueZ via D-Bus.
    network_mode: host
    volumes:
      - /var/run/dbus:/var/run/dbus:ro          # host BlueZ (bluetooth.service must run)
      - clawd-token:/root/.claude:ro            # token (read-only; refresher owns it)
      - clawd-config:/root/.config              # resolved BLE MAC cache
    # BlueZ scanning over the mounted D-Bus socket normally works unprivileged.
    # Uncomment if your distro's D-Bus policy blocks the container from org.bluez.
    # privileged: true

volumes:
  clawd-token:
  clawd-config:
